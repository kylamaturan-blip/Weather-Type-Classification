<!DOCTYPE html>  
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">
<link rel="short icon" href="favicon.png" type="image/png">
</head>

<body>

<!-- Clouds -->
<img class="cloud" src="https://cdn-icons-png.flaticon.com/512/414/414825.png" style="top:20%;">
<img class="cloud" src="https://cdn-icons-png.flaticon.com/512/414/414927.png" style="top:60%; animation-delay:10s;">

<div class="login-box">

    <!-- Logo -->
    <img src="logo.png" class="logo">

    <form onsubmit="resetPassword(event)">

        <h2 class="login-title">Reset Password</h2>

        <!-- New Password -->
        <div class="input-box">
            <input type="password" id="newPassword" placeholder="New Password" required>
            <span class="icon">🔒</span>
        </div>

        <!-- Confirm Password -->
        <div class="input-box">
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <span class="icon">🔒</span>
        </div>

        <button type="submit">Reset Password</button>

        <div class="register">
            Back to <a href="login.html">Login</a>
        </div>

    </form>

    <div class="footer">© WeatherNet System</div>
</div>

<script>

// Get email from URL
const params = new URLSearchParams(window.location.search);
const emailFromURL = params.get("email");

function resetPassword(e){
    e.preventDefault();

    const newPass = document.getElementById("newPassword").value;
    const confirmPass = document.getElementById("confirmPassword").value;

    if(newPass !== confirmPass){
        alert("Passwords do not match!");
        return;
    }

    let userFound = false;

    // Find user by email
    for(let i = 0; i < localStorage.length; i++){
        let key = localStorage.key(i);

        if(key === "rememberedUser") continue;

        let user = JSON.parse(localStorage.getItem(key));

        if(user.email === emailFromURL){
            user.password = newPass;
            localStorage.setItem(user.username, JSON.stringify(user));
            userFound = true;
            break;
        }
    }

    if(!userFound){
        alert("Error resetting password.");
        return;
    }

    alert("Password successfully reset!");

    window.location.href = "login.html";
}

/* Rain animation */
for(let i=0;i<100;i++){
    let drop = document.createElement("div");
    drop.className="rain";
    drop.style.left=Math.random()*100+"vw";
    drop.style.animationDuration=(Math.random()*1+0.5)+"s";
    document.body.appendChild(drop);
}
</script>

</body>
</html>
