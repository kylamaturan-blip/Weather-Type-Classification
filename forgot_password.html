<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password</title>

<link rel="stylesheet" href="style.css">
<link rel="short icon" href="favicon.png" type="image/png">
</head>

<body>

<!-- Clouds -->
<img class="cloud" src="https://cdn-icons-png.flaticon.com/512/414/414825.png" style="top:20%;">
<img class="cloud" src="https://cdn-icons-png.flaticon.com/512/414/414927.png" style="top:60%; animation-delay:10s;">

<div class="login-box">

    <!-- Logo -->
    <img src="logo.png" class="logo">

    <form onsubmit="sendCode(event)">

        <h2 class="login-title">Forgot Password</h2>

        <div class="input-box">
            <input type="text" id="emailUser" placeholder="Enter Username or Email" required>
            <span class="icon">📧</span>
        </div>

        <button type="submit">Send Reset Link</button>

        <div class="register">
            Remember your password?
            <a href="login.html">Login</a>
        </div>

    </form>

    <div class="footer">© WeatherNet System</div>
</div>

<script>
function sendCode(e){
    e.preventDefault();

    const inputValue = document.getElementById("emailUser").value.trim().toLowerCase();

    if(inputValue === ""){
        alert("Please enter your username or email.");
        return;
    }

    let foundUser = null;

    // Loop through all localStorage keys safely
    for(let i = 0; i < localStorage.length; i++){

        const key = localStorage.key(i);

        // Skip non-user data
        if(key === "rememberedUser") continue;

        try {
            const data = localStorage.getItem(key);
            const user = JSON.parse(data);

            // Make sure it's a valid user object
            if(user && user.username && user.email){

                if(
                    user.username.toLowerCase() === inputValue ||
                    user.email.toLowerCase() === inputValue
                ){
                    foundUser = user;
                    break;
                }
            }

        } catch(error) {
            // Skip invalid JSON entries
            continue;
        }
    }

    if(!foundUser){
        alert("No account found with that username or email.");
        return;
    }

    alert("Password reset link sent to: " + foundUser.email);

    window.location.href =
        "reset_password.html?email=" +
        encodeURIComponent(foundUser.email);
}

/* Rain animation */
for(let i=0;i<100;i++){
    let drop = document.createElement("div");
    drop.className="rain";
    drop.style.left=Math.random()*100+"vw";
    drop.style.animationDuration=(Math.random()*1+0.5)+"s";
    document.body.appendChild(drop);
}
</script>
</body>
</html>
