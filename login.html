<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weathernet Login | Mission Access</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background: radial-gradient(ellipse at bottom, #0b0f2a 0%, #000000 100%);
}

/* ⭐ STAR FIELD */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    animation: twinkle 3s infinite;
    opacity:0.6;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🌧️ RAIN */
.rain{
    position:absolute;
    width:1px;
    height:20px;
    background:rgba(120,180,255,0.5);
    top:-20px;
    animation: fall linear infinite;
}

@keyframes fall{
    to{ transform: translateY(110vh); }
}

/* 🌌 CLOUDS */
.cloud{
    position:absolute;
    width:120px;
    opacity:0.08;
    animation: float 40s linear infinite;
}

@keyframes float{
    0%{transform:translateX(-10%);}
    100%{transform:translateX(110vw);}
}

/* 🧑‍🚀 LOGIN BOX */
.login-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:380px;
    padding:40px;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,150,255,0.2);
    text-align:center;
    color:white;
}

/* LOGO */
.logo{
    width:90px;
    margin-bottom:15px;
    filter: drop-shadow(0 0 10px #00c3ff);
}

/* INPUT BOX */
.input-box{
    position:relative;
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:12px 40px 12px 15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.2);
    transition:0.3s;
}

/* FIX AUTOFILL ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px #0b0f2a inset !important;
    -webkit-text-fill-color: white !important;
}

.input-box input:focus{
    border:1px solid #00c3ff;
    box-shadow:0 0 10px #00c3ff;
}

.input-box .icon{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    opacity:0.8;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00c3ff,#005bea);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 15px rgba(0,195,255,0.4);
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(0,195,255,0.7);
}

/* LINKS */
.register{
    margin-top:15px;
    font-size:12px;
}

.register a{
    color:#00c3ff;
    text-decoration:none;
}

.register a:hover{
    text-shadow:0 0 10px #00c3ff;
}

/* ERROR */
#msg{
    margin-top:10px;
    font-size:12px;
    color:#ff4d4d;
}
</style>
</head>

<body>

<!-- 🌠 STAR GENERATOR -->
<script>
for(let i=0;i<120;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(star);
}
</script>

<!-- ☁️ CLOUDS -->
<img class="cloud" src="https://cdn-icons-png.flaticon.com/512/414/414825.png" style="top:20%;">
<img class="cloud" src="https://cdn-icons-png.flaticon.com/512/414/414927.png" style="top:60%; animation-delay:10s;">

<!-- 🚀 LOGIN -->
<div class="login-box">

    <img src="logo.png" class="logo">

    <form onsubmit="login(event)" autocomplete="off">

    <!-- HARD AUTOFILL BLOCK (important) -->
    <input type="text" style="display:none" autocomplete="username">
    <input type="password" style="display:none" autocomplete="new-password">

    <div class="input-box">
        <input type="email"
               id="email"
               placeholder="Username or Email"
               required
               autocomplete="off"
               name="random_email_field"
               readonly
               onfocus="this.removeAttribute('readonly')">
        <span class="icon">📧</span>
    </div>

    <div class="input-box">
        <input type="password"
               id="password"
               placeholder="Password"
               required
               autocomplete="new-password"
               name="random_password_field"
               readonly
               onfocus="this.removeAttribute('readonly')">
        <span class="icon">🔐</span>
    </div>

    <button type="submit">LOGIN</button>

    <div class="register">
        New user? <a href="register.html">Register</a>
    </div>

    <p id="msg"></p>
</form>
</div>

<!-- 🔥 FIREBASE LOGIN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCOuRxcty7SO6qHN47yLYyqtKCZWgHhyfA",
  authDomain: "weathernet-27dc9.firebaseapp.com",
  projectId: "weathernet-27dc9",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(e){
    e.preventDefault();

    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    const msg=document.getElementById("msg");

    try{
        await signInWithEmailAndPassword(auth,email,password);
        window.location.href="dashboard.html";
    }catch(err){
        msg.textContent="ACCESS DENIED: Invalid credentials";
    }
};
</script>

<!-- 🌧️ RAIN EFFECT -->
<script>
for(let i=0;i<80;i++){
    let drop=document.createElement("div");
    drop.className="rain";
    drop.style.left=Math.random()*100+"vw";
    drop.style.animationDuration=(Math.random()*1+0.5)+"s";
    document.body.appendChild(drop);
}
</script>

</body>
</html>
