<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard (Advanced)</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{background:linear-gradient(to bottom,#5fa8f5,#eaf6ff);} 

.header{
  background:linear-gradient(to right,#1e3c72,#2a5298);
  color:#fff;padding:18px 25px;
  display:flex;justify-content:space-between;align-items:center;
}

.header h1{font-size:20px;display:flex;gap:10px;align-items:center;}

.container{padding:25px;}

.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;margin-bottom:20px;
}

.card{
  background:#fff;padding:15px;border-radius:12px;
  box-shadow:0 5px 12px rgba(0,0,0,0.1);
  transition:.3s;
}
.card:hover{transform:translateY(-5px);} 
.card h4{font-size:13px;color:#666;margin-bottom:5px;}
.card p{font-size:17px;font-weight:bold;}

.grid{
  display:grid;grid-template-columns:2fr 1fr;gap:20px;
}

.panel{
  background:#fff;padding:20px;border-radius:12px;
  box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.panel h3{margin-bottom:15px;font-size:15px;}

.table{
  margin-top:20px;background:#fff;padding:20px;border-radius:12px;
  box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #eee;font-size:13px;}

.badge{padding:5px 10px;border-radius:15px;color:#fff;font-size:11px;}
.sunny{background:#f39c12;} .cloudy{background:#7f8c8d;}
.rainy{background:#2980b9;} .stormy{background:#e74c3c;}

@media(max-width:900px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <h1><i class="fa-solid fa-cloud-sun"></i> Weather Type Classification</h1>
  <div><i class="fa-solid fa-user"></i> Admin</div>
</div>

<div class="container">

<div class="cards" id="cards"></div>

<div class="grid">
  <div class="panel">
    <h3>UV Index Distribution</h3>
    <canvas id="uvChart"></canvas>
  </div>

  <div class="panel">
    <h3>Seasonal Breakdown</h3>
    <canvas id="seasonChart"></canvas>
  </div>
</div>

<div class="table">
<h3>Weather Data Records</h3>
<table id="dataTable"></table>
</div>

</div>

<script>
// MOCK BACKEND (replace with Flask API later)
const apiData = {
  summary:{
    Temperature:"-15°C to 42°C",
    Humidity:"12% to 105%",
    Wind:"5 - 180 km/h",
    Precip:"0% - 220%",
    Cloud:"Overcast",
    Pressure:"950 - 1045 hPa",
    UV:"0 - 11+"
  },
  table:[
    ["City",-8.3,"110%",60,"15%","Foggy",1012,1,"Winter",0.5,"Sunny"],
    ["Coastal",32.5,"85%",90,"0%","Clear",1008,8,"Summer",20,"Cloudy"],
    ["Forest",-3.1,"95%",45,"180%","Overcast",995,2,"Spring",2,"Rainy"],
    ["Mountain",25.8,"45%",140,"5%","Partly",1025,9,"Autumn",30,"Stormy"]
  ]
};

// LOAD CARDS
const cardContainer=document.getElementById("cards");
for(let key in apiData.summary){
  cardContainer.innerHTML+=`<div class="card"><h4>${key}</h4><p>${apiData.summary[key]}</p></div>`;
}

// LOAD TABLE
const table=document.getElementById("dataTable");
table.innerHTML=`<tr><th>Location</th><th>Temp</th><th>Humidity</th><th>Wind</th><th>Precip</th><th>Cloud</th><th>Pressure</th><th>UV</th><th>Season</th><th>Visibility</th><th>Type</th></tr>`;

apiData.table.forEach(row=>{
  let badgeClass=row[10].toLowerCase();
  table.innerHTML+=`<tr>${row.map((d,i)=> i==10 ? `<td><span class="badge ${badgeClass}">${d}</span></td>`:`<td>${d}</td>`).join('')}</tr>`;
});

// CHARTS
new Chart(document.getElementById('uvChart'),{
  type:'bar',
  data:{
    labels:['Low','Moderate','High','Very High','Extreme'],
    datasets:[{label:'UV Index',data:[2,4,6,8,11]}]
  }
});

new Chart(document.getElementById('seasonChart'),{
  type:'pie',
  data:{
    labels:['Winter','Spring','Summer','Autumn'],
    datasets:[{data:[25,25,25,25]}]
  }
});

// FUTURE BACKEND (FLASK EXAMPLE)
/*
fetch('http://127.0.0.1:5000/predict')
.then(res=>res.json())
.then(data=>{
  console.log(data);
});
*/
</script>

</body>
</html>
